<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human</title>
    <style>
      :root {
        --black: #000000;
        --label: #f5f5f7;
        --font:
          -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui,
          sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--black);
        font-family: var(--font);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      p {
        color: var(--label);
        font-size: 20px;
        font-weight: 400;
        letter-spacing: 0.01em;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <p>Human is on its way.</p>
  </body>
</html>
